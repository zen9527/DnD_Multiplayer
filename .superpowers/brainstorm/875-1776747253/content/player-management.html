<h2>玩家角色管理方式</h2>
<p class="subtitle">如何在单机上切换和管理不同玩家的角色</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>轮换操作模式</h3>
      <p>屏幕显示当前玩家的视角，玩家轮流使用键盘/鼠标操作。类似回合制，每次切换展示不同角色的状态。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>分屏/分区模式</h3>
      <p>屏幕分成多个区域，每个区域显示一个角色的状态面板。所有玩家同时看到各自的角色信息。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>卡片切换模式</h3>
      <p>屏幕中央显示当前活动内容（战斗/对话），底部有角色卡片槽。点击卡片切换到该角色的行动。</p>
    </div>
  </div>
</div>
